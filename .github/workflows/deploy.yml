
test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check syntax only
        run: |
          cd backend
          python -m py_compile app.py
          echo "Syntax check passed ✅"
```

**Key change:**
```
Old → python -c "from app import app"
      ❌ runs init_db() → tries DB connection → FAILS

New → python -m py_compile app.py
      ✅ checks syntax only → no DB needed → PASSES
